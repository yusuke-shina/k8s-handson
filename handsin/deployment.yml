# nginx-deployment.yaml
# Deployment = 店長への指示書

# API バージョンと種類の宣言
apiVersion: apps/v1
kind: Deployment

# Deploymentの名前
metadata:
  name: nginx-deployment

# Deploymentの仕様（店長への指示内容）
spec:
  # レプリカ数 = 「常に3人体制で」
  replicas: 3

  # どのPodを管理するか（ラベルで紐づけ）
  selector:
    matchLabels:
      app: nginx

  # Podのテンプレート（スタッフの募集要項）
  template:
    # Podに付けるラベル
    metadata:
      labels:
        app: nginx

    # Podの中身（コンテナの定義）
    spec:
      containers:
        - name: nginx
          image: nginx:1.25       # 使用するイメージ
          ports:
            - containerPort: 80   # コンテナ内のポート

---
# nginx-service-clusterip.yaml
# ClusterIP Service = お店の内線電話

apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
spec:
  # ClusterIP（デフォルト。省略してもClusterIPになる）
  type: ClusterIP

  # どのPodに振り分けるか（ラベルで紐づけ）
  selector:
    app: nginx                # ← Deploymentの labels と一致させる

  # ポート設定
  ports:
    - port: 80                # Serviceが受け付けるポート
      targetPort: 80          # Pod側のポート

