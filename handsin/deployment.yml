kind: Namespace
apiVersion: v1
metadata:
  name: production
  labels:
    name: production

---
kind: Namespace
apiVersion: v1
metadata:
  name: development
  labels:
    name: development

---
# nginx-deployment.yaml
# Deployment = 店長への指示書

# API バージョンと種類の宣言
apiVersion: apps/v1
kind: Deployment

# Deploymentの名前
metadata:
  name: nginx-deployment
  namespace: production # ← どのNamespaceに属するか指定

# Deploymentの仕様（店長への指示内容）
spec:
  # レプリカ数 = 「常に3人体制で」
  replicas: 2

  # どのPodを管理するか（ラベルで紐づけ）
  selector:
    matchLabels:
      app: nginx

  # Podのテンプレート（スタッフの募集要項）
  template:
    # Podに付けるラベル
    metadata:
      labels:
        app: nginx

    # Podの中身（コンテナの定義）
    spec:
      containers:
        - name: nginx
          image: nginx:1.25 # 使用するイメージ
          ports:
            - containerPort: 80 # コンテナ内のポート
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
# nginx-deployment.yaml
# Deployment = 店長への指示書

# API バージョンと種類の宣言
apiVersion: apps/v1
kind: Deployment

# Deploymentの名前
metadata:
  name: nginx-deployment
  namespace: development # ← どのNamespaceに属するか指定

# Deploymentの仕様（店長への指示内容）
spec:
  # レプリカ数 = 「常に3人体制で」
  replicas: 1

  # どのPodを管理するか（ラベルで紐づけ）
  selector:
    matchLabels:
      app: nginx

  # Podのテンプレート（スタッフの募集要項）
  template:
    # Podに付けるラベル
    metadata:
      labels:
        app: nginx

    # Podの中身（コンテナの定義）
    spec:
      containers:
        - name: nginx
          image: nginx:latest # 使用するイメージ
          ports:
            - containerPort: 80 # コンテナ内のポート
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
# nginx-service-clusterip.yaml
# NodePort Service = お店の直通電話

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  # NodePort（外部からアクセス可能）
  type: NodePort

  # どのPodに振り分けるか（ラベルで紐づけ）
  selector:
    app: nginx # ← Deploymentの labels と一致させる

  # ポート設定
  ports:
    - port: 80 # Serviceが受け付けるポート
      targetPort: 80 # Pod側のポート
      nodePort: 30080 # 外部からアクセスするためのポート

---
# app-configmap.yaml
# ConfigMap = メニュー表（一般的な設定情報）

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  # キー: 値 の形式で設定を記述
  APP_NAME: "MyRestaurant"
  APP_ENV: "development"
  LOG_LEVEL: "info"

  # キー = ファイル名、値 = ファイルの中身
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        # カスタム：ヘルスチェック用エンドポイント
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

---
# app-secret.yaml
# Secret = レシピ帳（秘密情報）

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque

# stringData を使えば平文で書ける（k8sが自動でbase64エンコードする）
stringData:
  DB_PASSWORD: "super_secret_password"
  API_KEY: "ak_1234567890abcdef"

---
# pod-with-configmap.yaml
# ConfigMapから環境変数を受け取るPod

apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
spec:
  containers:
    # コンテナ1：データを書き込む（料理人）
    - name: writer
      image: busybox
      command:
        [
          "sh",
          "-c",
          "while true; do date >> /shared-data/log.txt; sleep 5; done",
        ]
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
      volumeMounts:
        - name: shared-volume
          mountPath: /shared-data # 書き込み先

    # コンテナ2：データを読み取る（配膳係）
    - name: reader
      image: busybox
      command: ["sh", "-c", "tail -f /shared-data/log.txt"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
      volumeMounts:
        - name: shared-volume
          mountPath: /shared-data # 読み取り元（同じボリューム）

    # コンテナ3：nginx（店長）
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "500m"

      # ConfigMapをファイルとしてマウント
      volumeMounts:
        - name: nginx-conf-volume # ボリューム名
          mountPath: /etc/nginx/conf.d # マウント先のパス
          readOnly: true

      # ConfigMapから環境変数を一括読み込み
      envFrom:
        - configMapRef:
            name: nginx-config # ← ConfigMapの名前を指定

      # Secretから個別に環境変数を読み込み
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret # Secret名
              key: DB_PASSWORD # Secretのキー

        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: API_KEY

  # ボリュームの定義
  volumes:
    - name: nginx-conf-volume # volumeMountsのnameと一致させる
      configMap:
        name: nginx-config # ConfigMap名
    - name: shared-volume
      emptyDir: {} # 空のディレクトリを共有するボリューム
