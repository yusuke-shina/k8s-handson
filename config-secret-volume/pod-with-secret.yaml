# pod-with-secret.yaml
# ConfigMap と Secret の両方を使うPod

apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
spec:
  containers:
    - name: demo
      image: busybox
      command: ["sh", "-c", "echo APP_NAME=$APP_NAME && echo DB_PASSWORD=$DB_PASSWORD && echo API_KEY=$API_KEY && sleep 3600"]

      # ConfigMapから一般設定を読み込み
      envFrom:
        - configMapRef:
            name: app-config

      # Secretから個別に環境変数を読み込み
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret       # Secret名
              key: DB_PASSWORD       # Secretのキー

        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: API_KEY
