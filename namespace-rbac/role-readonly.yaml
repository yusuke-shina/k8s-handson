# role-readonly.yaml
# Role = 「何ができるか」の定義

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader               # ロール名
  namespace: production          # このNamespace内でのみ有効
rules:
  # Pod に対する権限
  - apiGroups: [""]              # コアAPI（Pod, Service等）
    resources: ["pods"]          # 対象リソース
    verbs: ["get", "list", "watch"]   # 許可する操作（読み取りのみ）

  # Service に対する権限
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
